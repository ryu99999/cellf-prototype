/* ★ 금액→크기 매핑: sqrt 스케일 (면적 비례, 직관적 비교) */
function amtToSize(amt){
  var minAmt=9900,maxAmt=450000,minSz=100,maxSz=140;
  var t=(Math.sqrt(Math.max(amt,minAmt))-Math.sqrt(minAmt))/(Math.sqrt(maxAmt)-Math.sqrt(minAmt));
  return Math.round(minSz+Math.min(t,1)*(maxSz-minSz));
}

/* ★ 동적 배치: 건강=중심, 종양=외곽, 사멸=중간 링 + 충돌 방지 */
function calcPositions(cells){
  var zones={center:[],mid:[],outer:[]};
  cells.forEach(function(c){
    if(c.type==="subscription") zones.center.push(c);
    else if(c.type==="dying") zones.mid.push(c);
    else zones.outer.push(c);
  });
  var result={};
  function sr(seed){var x=Math.sin(seed*9301+49297)*49297;return x-Math.floor(x)}
  function place(group,rMin,rMax,startAngle){
    var n=group.length;if(!n)return;
    var step=Math.PI*2/n;
    group.forEach(function(c,i){
      var a=startAngle+step*i+(sr(c.id*7)-0.5)*0.45;
      var r=rMin+sr(c.id*13)*(rMax-rMin);
      var x=50+Math.cos(a)*r;
      var y=50+Math.sin(a)*r;
      var s=amtToSize(c.amt);
      /* dying 세포는 0.85 스케일 적용되므로 기본 크기 보정 */
      if(c.type==="dying") s=Math.round(s*1.12);
      result[c.id]={x:x,y:y,s:s};
    });
  }
  place(zones.center,1,10,0.3);
  place(zones.mid,12,20,1.6);
  place(zones.outer,18,28,0.8);

  var ids=cells.map(function(c){return c.id});
  var CONTAINER=390;

  /* 1단계: 충돌 분리 — 세포 영역이 겹치지 않되 인접하게 */
  for(var iter=0;iter<60;iter++){
    for(var a=0;a<ids.length;a++){
      for(var b=a+1;b<ids.length;b++){
        var pa=result[ids[a]],pb=result[ids[b]];
        var dx=pb.x-pa.x,dy=pb.y-pa.y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        /* 세포 반경(%) — 균일한 간격: 일반 +6px, orbit +13px */
        var cellA=cells.find(function(cc){return cc.id===ids[a]});
        var cellB=cells.find(function(cc){return cc.id===ids[b]});
        var hasOrbitA=cellA&&(cellA.isSubscription||cellA.type==="dying"||cellA.type==="infected");
        var hasOrbitB=cellB&&(cellB.isSubscription||cellB.type==="dying"||cellB.type==="infected");
        /* 일반: 본체 + 여백 6px, orbit: 본체 + 고리 + 위성 13px */
        var rA=(pa.s+(hasOrbitA?13:6))/2/CONTAINER*100;
        var rB=(pb.s+(hasOrbitB?13:6))/2/CONTAINER*100;
        var minDist=rA+rB; /* orbit 외곽끼리 겹치지 않게 */
        if(dist<minDist&&dist>0.01){
          var push=(minDist-dist)/2*1.0; /* 풀 푸시 — 확실히 분리 */
          var nx=dx/dist,ny=dy/dist;
          pa.x-=nx*push; pa.y-=ny*push;
          pb.x+=nx*push; pb.y+=ny*push;
        } else if(dist<=0.01){
          var ra=sr(ids[a]*17+iter)*Math.PI*2;
          pa.x+=Math.cos(ra)*8; pa.y+=Math.sin(ra)*8;
          pb.x-=Math.cos(ra)*8; pb.y-=Math.sin(ra)*8;
        }
      }
    }
    /* 중심 인력 — 뭉침 유지 */
    ids.forEach(function(id){
      var p=result[id];
      p.x+=(50-p.x)*0.02;
      p.y+=(50-p.y)*0.02;
    });
  }

  /* 2단계: 바운딩 박스 계산 후 가용 영역 중앙 정렬 */
  /* 가용 영역: x=0~100%, y= 헤더 아래(~20%)부터 하단(~100%) → 중심 y=60% */
  var VIEW_CX=50, VIEW_CY=60;
  var bMinX=999,bMaxX=-999,bMinY=999,bMaxY=-999;
  ids.forEach(function(id){
    var p=result[id];
    var r=p.s/2/CONTAINER*100;
    if(p.x-r<bMinX) bMinX=p.x-r;
    if(p.x+r>bMaxX) bMaxX=p.x+r;
    if(p.y-r<bMinY) bMinY=p.y-r;
    if(p.y+r>bMaxY) bMaxY=p.y+r;
  });
  var groupCX=(bMinX+bMaxX)/2;
  var groupCY=(bMinY+bMaxY)/2;
  var shiftX=VIEW_CX-groupCX;
  var shiftY=VIEW_CY-groupCY;
  ids.forEach(function(id){
    var p=result[id];
    p.x+=shiftX;
    p.y+=shiftY;
  });

  /* 3단계: 경계 클램핑 */
  ids.forEach(function(id){
    var p=result[id];
    p.x=Math.max(6,Math.min(94,p.x));
    p.y=Math.max(20,Math.min(95,p.y));
  });
  return result;
}

            {stg>=3&&(

                <span style={{
                  fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",color:tds.green500,fontWeight:600,marginTop:6,
                  transition:"opacity 1s ease",

/* ═══ Small Components ═══ */

function LegendItem(props){
  var type=props.type,active=props.active,filtering=props.filtering,onTap=props.onTap;
  var c=TC[type];
  var isDefault=!filtering,isActive=filtering&&active;
  /* TDS Badge weak 패턴: 기본=neutral, 선택 시만 컬러 */
  var bgColor=isActive?c.lc:(filtering?"rgba(0,0,0,0.04)":"transparent");
  var txtColor=isActive?"#fff":(isDefault?tds.grey600:tds.grey400);
  var dotColor=c.lc||tds.grey400;
  return(
    <button onClick={onTap} style={{
      padding:"5px 9px",borderRadius:14,border:"none",background:bgColor,
      cursor:"pointer",transition:"all 0.12s ease",whiteSpace:"nowrap",
      WebkitTapHighlightColor:"transparent",minHeight:28,
      display:"flex",alignItems:"center",gap:4,
    }}>
      <div style={{width:5,height:5,borderRadius:3,background:isActive?"#fff":dotColor,flexShrink:0,opacity:isActive?0.9:(isDefault?0.7:0.35),transition:"all 0.12s"}}/>
      <span style={{fontSize:typo.sub11.s,fontWeight:isActive?600:500,color:txtColor,fontFamily:FF,transition:"color 0.15s"}}>{c.lbl}</span>
    </button>
  );
}

/* ═══ TDS-style Compact Top Banner (긴급 알림) ═══
   토스 앱 패턴: 컨텐츠 최상단 풀너비 슬림 배너
   - 1줄 텍스트, 최소 높이 (36px)
   - 좌측 컬러 도트(pulse) + 텍스트 + 우측 chevron
   - 배경: orange50, 보더 없음 (깔끔함 우선)
   - borderRadius: 8px (TDS sm 패턴)
*/
function ImmuneAlert(props){
  var cells=props.cells,onTap=props.onTap;
  var inf=cells.filter(function(c){return c.type==="infected"});
  if(inf.length===0) return null;
  var cell=inf[0];
  return(
    <div onClick={function(){onTap(cell)}} style={{
      display:"flex",alignItems:"center",gap:sp.sm,
      padding:sp.sm+"px "+sp.md+"px",borderRadius:8,cursor:"pointer",
      background:tds.orange50,
      marginBottom:sp.sm,
    }}>
      {/* Pulse dot */}
      <div style={{position:"relative",width:8,height:8,flexShrink:0}}>
        <div style={{width:8,height:8,borderRadius:4,background:tds.orange500}}/>
        <div style={{position:"absolute",inset:-3,borderRadius:7,border:"1.5px solid "+tds.orange400,animationName:"pulseRing",animationDuration:"2s",animationIterationCount:"infinite",opacity:0.4}}/>
      </div>
      {/* Single line: name + context */}
      <span style={{
        flex:1,minWidth:0,
        fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",
        color:"#e45600",fontWeight:600,
        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
      }}>
        {cell.name.replace("\n"," ")}
        <span style={{fontWeight:400,color:tds.grey500,marginLeft:4,fontSize:typo.sub11.s}}>{cell.freq}</span>
      </span>
      {/* Chevron */}
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{flexShrink:0}}><path d="M6 4l4 4-4 4" stroke={tds.grey400} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
    </div>
  );
}

function Toast(props){
  if(!props.show) return null;
  return(
    <div style={{
      position:"fixed",bottom:40,left:"50%",transform:"translateX(-50%)",
      padding:"12px 20px",borderRadius:24,background:tds.grey900,color:"#fff",
      fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",fontWeight:600,
      zIndex:300,boxShadow:"0 8px 32px rgba(0,0,0,0.18)",
      animationName:"toastIn",animationDuration:"0.3s",
      display:"flex",alignItems:"center",gap:sp.sm,fontFamily:FF,
    }}>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-6" stroke={tds.green400} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
      {props.message}
    </div>
  );
}

/* ═══ Detail Bottom Sheet — 단일 스크롤 플로우 ═══
   토스 원칙: Tap & Scroll — 탭 분절 대신 자연스러운 스크롤
   의료 프레임: 상태 확인 → 진단 → 처방 → 실행 (1장 스크롤)
   
   통일 규칙:
   - 모든 카드: borderRadius 12, padding 16px
   - 섹션 간격: 24px (lg)
   - 카드 내 간격: 8px (sm)
   - CTA: 하단 1개만 (중복 없음)
   - 폰트: 섹션 라벨 sub12/600/grey400, 본문 t6/400/grey600
*/
function DetailView(props){
  var cell=props.cell,onClose=props.onClose,onApo=props.onApo;
  var c=TC[cell.type];
  var catBudget=BUDGETS.cats[cell.cat]||0;
  var budgetRatio=catBudget>0?Math.round(cell.amt/catBudget*100):0;
  var ratioColor=budgetRatio>100?tds.red500:budgetRatio>80?tds.orange500:tds.grey600;
  var isActionable=cell.type==="dying"||cell.type==="infected"||cell.type==="tumor";
  /* #3: 상세 분석 토글 상태 */
  var _detail=useState(false),showDetail=_detail[0],setShowDetail=_detail[1];

  function clampPan(px,py,z){
    var maxP=(z-1)*50; /* 줌 1x→0, 1.5x→25%, 1.8x→40% 이동 가능 */
    if(maxP<0) maxP=0;
    return{x:Math.max(-maxP,Math.min(maxP,px)),y:Math.max(-maxP,Math.min(maxP,py))};
  }
  function handleWheel(e){
    e.preventDefault();

      /* 줌 아웃 시 패닝 한계 자동 보정 */

      else setPan(function(p){return clampPan(p.x,p.y,nz)});

  }

      if(e.touches&&e.touches.length===2){pr.panning=false;return;}
      var dx=(t.clientX-pr.startX)/zoom;
      var dy=(t.clientY-pr.startY)/zoom;
      var np=clampPan(pr.prevX+dx*0.28,pr.prevY+dy*0.28,zoom);

          animationName:"introText1",animationDuration:"2.8s",animationFillMode:"forwards",opacity:0,
        }}>소비 세포 관찰 시작</p>
        <h1 style={{fontSize:48,lineHeight:"56px",fontWeight:700,color:tds.grey900,letterSpacing:-2,margin:0,
          animationName:"introText2",animationDuration:"2.8s",animationFillMode:"forwards",opacity:0,
        }}>Cellf</h1>
        <p style={{fontSize:typo.t6.s,lineHeight:typo.t6.h+"px",color:tds.grey500,marginTop:sp.md,
          animationName:"introText3",animationDuration:"2.8s",animationFillMode:"forwards",opacity:0,
        }}>내 소비를 세포로 보고, AI로 치료한다</p>
      </div>}

      {/* ═══════════════════════════════════════
          BLOCK 1: 현미경 히어로 (풀블리드)
          — 헤더, 레전드 모두 이 안에 오버레이
          — 화면 최상단부터 시작, One Thing 지배
      ═══════════════════════════════════════ */}
      <div ref={scopeRef} onMouseDown={handleScopeDown} onTouchStart={function(e){if(e.touches.length===1&&zoom>1)handleScopeDown(e)}} style={{
        position:"relative",width:"100%",height:445,overflow:"hidden",
        display:tab==="home"?"block":"none",
        background:tds.grey50,
        boxShadow:"none",
        transition:"box-shadow 1.2s ease",
        animationName:"fadeUp",animationDuration:"0.6s",animationFillMode:"both",
        cursor:zoom>1?(panRef.current.panning?"grabbing":"grab"):"default",
      }}>
        {/* 배양액 틴트 */}
        <div style={{position:"absolute",inset:0,background:sb.tint,pointerEvents:"none",zIndex:0}}/>
        {/* 깊이감 그라디언트 */}
        <div style={{
          position:"absolute",inset:0,pointerEvents:"none",zIndex:0,
          background:"radial-gradient(ellipse 80% 80% at 35% 40%, "+sb.depthTint+" 0%, transparent 70%), "
            +"radial-gradient(ellipse 60% 50% at 70% 65%, "+sb.depthTint2+" 0%, transparent 60%), "
            +"radial-gradient(ellipse 120% 120% at 50% 50%, transparent 40%, rgba(0,0,0,0.02) 100%)",
        }}/>
        {/* 노이즈 텍스처 */}
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0,opacity:0.35}}>
          <defs><filter id="cultureMediumNoise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/><feColorMatrix type="saturate" values="0" in="noise" result="gray"/><feComponentTransfer in="gray"><feFuncA type="linear" slope="0.06"/></feComponentTransfer></filter></defs>
          <rect width="100%" height="100%" filter="url(#cultureMediumNoise)"/>
        </svg>
        {/* 그리드 */}
        <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient("+sb.gridTint+" 1px, transparent 1px), linear-gradient(90deg, "+sb.gridTint+" 1px, transparent 1px)",backgroundSize:(50*zoom)+"px "+(50*zoom)+"px",pointerEvents:"none",zIndex:1,transition:"background-size 0.3s ease"}}/>
        {/* 비네팅 */}
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,"+(sb.vignetteOpacity+0.03)+") 100%)",pointerEvents:"none",zIndex:12}}/>
        {/* 코스틱 */}
        <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:1,opacity:0.04,
          background:"radial-gradient(ellipse 25% 20% at 28% 32%, rgba(255,255,255,0.8) 0%, transparent 100%), "
            +"radial-gradient(ellipse 20% 15% at 68% 55%, rgba(255,255,255,0.6) 0%, transparent 100%), "
            +"radial-gradient(ellipse 15% 25% at 45% 78%, rgba(255,255,255,0.5) 0%, transparent 100%)",
        }}/>

        {/* ── 오버레이: 상단 헤더 (현미경 안) ── */}
        <div style={{
          position:"absolute",top:0,left:0,right:0,zIndex:14,
          padding:"52px "+sp.lg+"px 8px",
          display:"flex",justifyContent:"space-between",alignItems:"center",
          pointerEvents:"none",
          background:"linear-gradient(to bottom, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.7) 70%, rgba(255,255,255,0.3) 100%)",
          backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",
          borderBottom:"1px solid rgba(255,255,255,0.5)",
        }}>
          <div style={{display:"flex",alignItems:"center",gap:sp.sm,pointerEvents:"auto"}}>
            <span style={{fontSize:typo.t4.s,lineHeight:typo.t4.h+"px",fontWeight:700,color:tds.grey800,letterSpacing:-0.3}}>3월 소비</span>
            <span onClick={function(){setShowOverview(true)}} style={{
              padding:"4px 8px",borderRadius:8,
              fontSize:typo.sub12.s,lineHeight:typo.sub12.h+"px",fontWeight:500,
              background:"rgba(255,255,255,0.75)",backdropFilter:"blur(8px)",
              color:budgetPct>90?tds.red500:budgetPct>70?tds.orange500:tds.grey600,
              cursor:"pointer",
              WebkitTapHighlightColor:"transparent",
            }}>예산 {budgetPct}%</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:sp.sm,pointerEvents:"auto"}}>
            {/* 벨 — 감염 세포 있으면 red dot 표시 */}
            <div onClick={function(){if(cells.some(function(c){return c.type==="infected"}))setShowNotify(!showNotify)}} style={{width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:18,background:"none",cursor:"pointer",position:"relative"}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke={tds.grey600} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><path d="M13.73 21a2 2 0 01-3.46 0" stroke={tds.grey600} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              {cells.some(function(c){return c.type==="infected"})&&<div style={{position:"absolute",top:6,right:6,width:7,height:7,borderRadius:4,background:tds.red500}}/>}
            </div>
          </div>
        </div>

        {/* ── 알림 드롭다운 (TDS Toast/Dialog 패턴) ── */}
        {showNotify&&(function(){
          var inf=cells.filter(function(c){return c.type==="infected"});
          if(inf.length===0) return null;
          return(
            <div style={{position:"absolute",top:92,right:sp.lg,zIndex:20,width:260,
              background:"#fff",borderRadius:16,
              boxShadow:"0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06)",
              padding:sp.md,
              animationName:"fadeUp",animationDuration:"0.2s",animationFillMode:"both",
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:sp.sm}}>
                <span style={{fontSize:typo.sub12.s,lineHeight:typo.sub12.h+"px",fontWeight:600,color:tds.grey900}}>긴급 알림</span>
                <button onClick={function(){setShowNotify(false)}} style={{padding:0,border:"none",background:"none",cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke={tds.grey400} strokeWidth="1.5" strokeLinecap="round"/></svg>
                </button>
              </div>
              {inf.map(function(c){return(
                <div key={c.id} onClick={function(){setSel(c);setShowNotify(false)}} style={{
                  display:"flex",alignItems:"flex-start",gap:sp.sm+2,
                  padding:"12px 0",cursor:"pointer",
                  borderTop:"1px solid "+tds.grey100,
                }}>
                  {/* 도트 — 1행 텍스트 세로 중앙 정렬 */}
                  <div style={{width:8,height:8,borderRadius:4,background:tds.orange500,flexShrink:0,marginTop:5}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:typo.t6.s,lineHeight:typo.t6.h+"px",fontWeight:600,color:tds.grey900,display:"block"}}>{c.name.replace("\n"," ")}</span>
                    <span style={{fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",color:tds.orange500,fontWeight:500,marginTop:2,display:"block"}}>{c.freq}</span>
                  </div>
                </div>
              )})}
            </div>
          );
        })()}

        {/* ── 오버레이: 줌 리셋 — 우하단, 필터와 대칭 ── */}
        {zoom>1.05&&(
          <button onClick={function(){setZoom(1);setPan({x:0,y:0})}} style={{
            position:"absolute",bottom:14,right:sp.lg,zIndex:15,
            width:38,height:38,borderRadius:19,border:"none",
            background:"rgba(255,255,255,0.82)",
            backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",
            boxShadow:"0 1px 8px rgba(0,0,0,0.06)",
            display:"flex",alignItems:"center",justifyContent:"center",
            cursor:"pointer",padding:0,
            WebkitTapHighlightColor:"transparent",
            animationName:"fadeIn",animationDuration:"0.2s",animationFillMode:"both",
          }}>
            <span style={{fontSize:12,fontWeight:600,color:tds.grey600,fontFamily:MONO,letterSpacing:-0.5}}>1×</span>
          </button>
        )}

        {/* ── 필터 (현미경 하단) — 닫힘: 좌하단 아이콘, 열림: 풀너비 바 ── */}
        {!filterOpen&&(
          <button onClick={function(){setFilterOpen(true)}} style={{
            position:"absolute",bottom:14,left:sp.lg,zIndex:15,
            width:38,height:38,borderRadius:19,border:"none",
            background:"rgba(255,255,255,0.82)",
            backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",
            boxShadow:"0 1px 8px rgba(0,0,0,0.06)",
            display:"flex",alignItems:"center",justifyContent:"center",
            cursor:"pointer",padding:0,
            WebkitTapHighlightColor:"transparent",
          }}>
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
              <path d="M1.5 3h13M4 8h8M6 13h4" stroke={activeTypes!==null?tds.blue500:tds.grey500} strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
            {activeTypes!==null&&<div style={{position:"absolute",top:6,right:6,width:6,height:6,borderRadius:3,background:tds.blue500,border:"1.5px solid rgba(255,255,255,0.9)"}}/>}
          </button>
        )}
        {filterOpen&&(
          <div style={{
            position:"absolute",bottom:14,left:sp.lg,zIndex:15,
            height:38,borderRadius:19,
            background:"rgba(255,255,255,0.82)",
            backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",
            boxShadow:"0 1px 8px rgba(0,0,0,0.06)",
            display:"inline-flex",alignItems:"center",gap:0,
            padding:"0 8px 0 0",
            animationName:"fadeUp",animationDuration:"0.15s",animationFillMode:"both",
          }}>
            {/* 좌측 아이콘 — 필터 비활성: 닫기(필터), 필터 활성: 초기화(X) */}
            <button onClick={function(){if(activeTypes!==null){setActiveTypes(null)}else{setFilterOpen(false)}}} style={{
              width:34,height:34,borderRadius:17,border:"none",
              background:activeTypes!==null?"rgba(0,0,0,0.06)":"transparent",
              display:"flex",alignItems:"center",justifyContent:"center",
              cursor:"pointer",padding:0,flexShrink:0,marginLeft:2,
              WebkitTapHighlightColor:"transparent",
            }}>
              {activeTypes!==null?(
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke={tds.grey500} strokeWidth="1.4" strokeLinecap="round"/></svg>
              ):(
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1.5 3h13M4 8h8M6 13h4" stroke={tds.grey500} strokeWidth="1.4" strokeLinecap="round"/></svg>
              )}
            </button>
            {/* 칩들 */}
            <div style={{display:"flex",gap:2,alignItems:"center",minWidth:0}}>
              {legendTypes.map(function(type){return(
                <LegendItem key={type} type={type} active={isTypeActive(type)} filtering={activeTypes!==null} onTap={function(){toggleType(type)}}/>
              )})}
            </div>
          </div>
        )}

        {/* ── 세포 줌+패닝 레이어 ── */}
        <div style={{
          position:"absolute",inset:0,zIndex:2,
          transform:"scale("+zoom+") translate("+pan.x+"%,"+pan.y+"%)",
          transformOrigin:"50% 50%",
          transition:panRef.current.panning?"none":"transform 0.15s ease-out",
        }}>
        {cells.map(function(c){
          var dimmed=activeTypes!==null&&!activeTypes[c.type];
          var pos=posMap[c.id];
          if(!pos) return null;
          var isAbsorbing=false;
          return <CellNode key={c.id} cell={c} pos={pos} idx={c.id} onClick={setSel} dimmed={dimmed} absorbing={isAbsorbing}/>;
        })}
        </div>
      </div>

      {/* ═══════════════════════════════════════
          BLOCK 2: 스크롤 컨텐츠 영역
          — 현미경 아래, 여유로운 패딩
      ═══════════════════════════════════════ */}
      <div style={{padding:sp.md+"px "+sp.lg+"px 108px",position:"relative",display:tab==="home"?"block":"none"}}>

        {/* ── 이번 달 요약 — TDS ListHeader 패턴 ── */}
        <div style={{
          animationName:"fadeUp",animationDuration:"0.5s",animationFillMode:"both",
          animationDelay:"0.4s",
        }}>
          <div style={{marginBottom:sp.sm}}>
            {/* upper: 보조설명 */}
            <span style={{fontSize:typo.sub12.s,lineHeight:typo.sub12.h+"px",fontWeight:400,color:tds.grey500,display:"block",marginBottom:2}}>3월 기준</span>
            {/* title + right row */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:typo.t5.s,lineHeight:typo.t5.h+"px",fontWeight:700,color:tds.grey900}}>이번 달 요약</span>
            </div>
          </div>

          {sums.map(function(s,i){
            var tc=TC[s.t];
            var total=cells.filter(function(c){return c.type===s.t}).reduce(function(a,c){return a+c.amt},0);
            var count=cells.filter(function(c){return c.type===s.t}).length;
            if(count===0) return null;
            var amtStr=String(total).replace(/\B(?=(\d{3})+(?!\d))/g,",");
            return(
              <div key={s.t}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0"}}>
                  {/* 좌측: 도트 + 라벨 + 트렌드 */}
                  <div style={{display:"flex",alignItems:"center",gap:sp.sm,minWidth:0}}>
                    <div style={{width:8,height:8,borderRadius:4,background:tc.lc||tds.grey400,flexShrink:0}}/>
                    <span style={{fontSize:typo.t6.s,lineHeight:typo.t6.h+"px",color:tds.grey600,fontWeight:400}}>{s.l}</span>
                    {s.trend&&<span style={{fontSize:typo.sub12.s,lineHeight:typo.sub12.h+"px",color:s.trendColor,fontWeight:500,marginLeft:2}}>{s.trend}</span>}
                  </div>
                  {/* 우측: 금액 — 숫자 t5/600, 원 t7/400 */}
                  <span style={{flexShrink:0}}>
                    <span style={{fontSize:typo.t5.s,lineHeight:typo.t5.h+"px",fontWeight:600,color:tds.grey900}}>{amtStr}</span>
                    <span style={{fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",fontWeight:400,color:tds.grey400,marginLeft:1}}>원</span>
                  </span>
                </div>
                {i<sums.length-1&&<div style={{height:1,background:tds.grey100,marginLeft:20}}/>}
              </div>
            );
          })}
        </div>

        {/* ── 인사이트 카드 (동적 계산) ── */}
        {(function(){
          var cleanable=cells.filter(function(c){return c.type==="dying"||c.type==="infected"});
          if(cleanable.length===0) return null;
          var totalSave=cleanable.reduce(function(a,c){return a+c.amt},0);
          return(
            <div style={{
              marginTop:sp.md,padding:sp.md+"px "+sp.lg+"px",borderRadius:16,
              background:tds.blue50,
              animationName:"fadeUp",animationDuration:"0.5s",animationFillMode:"both",
              animationDelay:"0.6s",
            }}>
              <p style={{fontSize:typo.t6.s,lineHeight:typo.t6.h+"px",color:tds.blue600,margin:0,fontWeight:500}}>
                정리 가능한 {cleanable.length}개를 처리하면 월 <span style={{fontWeight:600}}>{fmt(totalSave)}</span> 절약
              </p>
            </div>
          );
        })()}

      </div>

      {tab==="home"&&sel&&<DetailView cell={sel} onClose={function(){setSel(null)}} onApo={doApo}/>}
      {tab==="home"&&apo&&<ApoptosisView cell={apo} onDone={doneApo} onClose={function(){setSel(apo);setApo(null)}}/>}

      {/* ═══ 생태계 오버뷰 바텀시트 ═══ */}
      {showOverview&&(function(){
        var tumorCells=cells.filter(function(c){return c.type==="tumor"});
        var dyingCells=cells.filter(function(c){return c.type==="dying"});
        var infectedCells=cells.filter(function(c){return c.type==="infected"});
        var healthyCells=cells.filter(function(c){return c.type==="subscription"});
        var tumorAmt=tumorCells.reduce(function(a,c){return a+c.amt},0);
        var dyingAmt=dyingCells.reduce(function(a,c){return a+c.amt},0);
        var infectedAmt=infectedCells.reduce(function(a,c){return a+c.amt},0);
        var saveable=dyingAmt+infectedAmt;
        /* 상태 판정 */
        var grade=budgetPct>90?"danger":budgetPct>70?"caution":"good";
        var gradeColor=grade==="danger"?tds.red500:grade==="caution"?tds.orange500:tds.blue500;
        var gradeTitle=grade==="danger"?"지출이 많은 달이에요":grade==="caution"?"조금 신경 쓰면 좋겠어요":"전반적으로 괜찮아요";
        var gradeDesc=grade==="danger"?"예산의 90%를 넘겼어요. 남은 기간 동안 지출을 줄여보는 건 어떨까요?"
          :grade==="caution"?"예산의 70%를 넘겼어요. 아직 여유가 있지만 속도 조절이 필요해요."
          :"예산 범위 안에서 잘 쓰고 있어요. 이 페이스 유지하면 돼요.";

        /* 인사이트 항목 생성 */
        var insights=[];
        if(tumorCells.length>0) insights.push({
          icon:"📈",color:"#c44bd7",bg:"#f3e8ff",
          title:tumorCells.map(function(c){return c.name}).join(", ")+"에서 과소비가 감지됐어요",
          desc:"총 "+fmt(tumorAmt)+"으로 예산을 초과하고 있어요.",
        });
        if(dyingCells.length>0) insights.push({
          icon:"💤",color:tds.grey600,bg:tds.grey100,
          title:dyingCells.length+"개 구독을 안 쓰고 있어요",
          desc:"정리하면 월 "+fmt(dyingAmt)+"을 아낄 수 있어요.",
        });
        if(infectedCells.length>0) insights.push({
          icon:"⏰",color:tds.orange500,bg:tds.orange50,
          title:"곧 유료로 바뀌는 구독이 있어요",
          desc:infectedCells[0].name+" — "+infectedCells[0].freq+". 지금 확인해보세요.",
        });
        if(healthyCells.length>0) insights.push({
          icon:"✓",color:tds.blue500,bg:tds.blue50,
          title:healthyCells.length+"개 지출은 정상 범위예요",
          desc:"큰 변동 없이 안정적으로 유지되고 있어요.",
        });

        return(
          <div style={{position:"fixed",inset:0,zIndex:900}}>
            {/* dim */}
            <div onClick={function(){setShowOverview(false)}} style={{
              position:"absolute",inset:0,background:"rgba(25,31,40,0.45)",
              animationName:"fadeIn",animationDuration:"0.2s",animationFillMode:"both",
            }}/>
            {/* 시트 */}
            <div style={{
              position:"absolute",bottom:0,left:0,right:0,
              background:tds.bg,borderRadius:"20px 20px 0 0",
              maxHeight:680,
              animationName:"sheetUp",animationDuration:"0.35s",animationTimingFunction:"cubic-bezier(0.32,0.72,0,1)",animationFillMode:"both",
              display:"flex",flexDirection:"column",
            }}>
              {/* 핸들 */}
              <div style={{display:"flex",justifyContent:"center",padding:"10px 0 4px"}}>
                <div style={{width:36,height:4,borderRadius:2,background:tds.grey200}}/>
              </div>

              {/* 스크롤 영역 */}
              <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"4px "+sp.lg+"px "+sp.xl+"px"}}>

                {/* 상태 헤더 — TDS AmountTop 패턴 */}
                <div style={{marginBottom:sp.lg}}>
                  {/* 상단 라벨 */}
                  <span style={{fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",fontWeight:400,color:tds.grey500,display:"block",marginBottom:sp.xs}}>3월 소비 예산</span>
                  {/* 히어로 — TDS t3 스케일, 숫자+% 인라인 */}
                  <span style={{fontSize:26,lineHeight:"34px",fontWeight:700,color:tds.grey900,display:"block"}}>{budgetPct}%<span style={{fontSize:typo.t6.s,fontWeight:500,color:tds.grey400,marginLeft:6}}>사용</span></span>

                  {/* TDS ProgressBar normal — height 8, borderRadius 4 */}
                  <div style={{marginTop:sp.md,marginBottom:sp.sm}}>
                    <div style={{height:8,borderRadius:4,background:tds.grey100,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:4,width:Math.min(budgetPct,100)+"%",background:gradeColor,transition:"width 0.5s ease-out"}}/>
                    </div>

/* ═══ Onboarding — Category Colors ═══ */
function obFmt(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,",")}

function OBPresetCard(props){
  var preset=props.preset,isSel=props.selected,budget=props.budget,entering=props.entering,idx=props.idx,onClick=props.onClick,customTapped=props.customTapped;
  var isCustom=preset.id==="custom";

  /* Key differentiator per preset */
  var highlight=null;
  if(!isCustom&&preset.ratios){
    var lifeAmt=Math.round(budget*(preset.ratios["생활"]||0));
    var lifePct=Math.round((preset.ratios["생활"]||0)*100);
    highlight={pct:lifePct,amt:lifeAmt};
  }

  return(
    <button onClick={onClick} className="btn-press" style={{
      width:"100%",textAlign:"left",
      padding:sp.md+"px",
      borderRadius:16,
      border:"1.5px solid "+(isSel?tds.blue500:tds.grey200),
      background:isSel?tds.blue50:"#fff",
      cursor:"pointer",fontFamily:FF,position:"relative",
      transition:"border-color 0.2s ease, background 0.2s ease",
      animationName:entering?"obCardUp":"none",animationDuration:"0.35s",
      animationDelay:(0.08+idx*0.07)+"s",animationFillMode:"both",animationTimingFunction:"ease",
    }}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{flex:1,minWidth:0}}>
          {/* Title — t5 700: clearly dominant */}
          <div style={{fontSize:typo.t5.s,lineHeight:typo.t5.h+"px",fontWeight:700,color:tds.grey900}}>{preset.label}</div>
          {/* Desc — sub12 400: clearly subordinate, tighter to title */}
          <div style={{fontSize:typo.sub12.s,lineHeight:typo.sub12.h+"px",fontWeight:400,color:tds.grey500,marginTop:3}}>{preset.desc}</div>
          {/* Selected highlight — blue accent stat */}
          {isSel&&highlight&&(
            <div style={{marginTop:8,fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",color:tds.blue500,fontWeight:600,
              animationName:"obLabelFade",animationDuration:"0.2s",animationFillMode:"both"}}>
              생활비 {highlight.pct}% · {obFmt(highlight.amt)}원
            </div>
          )}
          {isCustom&&customTapped&&(
            <div style={{marginTop:6,fontSize:typo.sub12.s,color:tds.grey400,fontWeight:400,
              animationName:"obLabelFade",animationDuration:"0.2s"}}>아직 준비 중이에요</div>
          )}
        </div>
        {/* Radio — check or empty circle */}
        {isSel?(
          <div style={{width:24,height:24,borderRadius:12,background:tds.blue500,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginLeft:sp.md,
            animationName:"obCheckPop",animationDuration:"0.25s"}}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        ):(
          <div style={{width:24,height:24,borderRadius:12,border:"1.5px solid "+tds.grey300,flexShrink:0,marginLeft:sp.md}}/>
        )}
      </div>
    </button>
  );
}

/* Step 1: Budget Input */
function OBStepBudget(props){
  var onNext=props.onNext;
  var _amt=useState(""),amount=_amt[0],setAmount=_amt[1];
  var _enter=useState(false),entering=_enter[0],setEntering=_enter[1];
  useEffect(function(){setTimeout(function(){setEntering(true)},100)},[]);

  function handleKey(key){setAmount(function(p){var n=p+key;if(Number(n)>9999999)return p;return n})}
  function handleBack(){setAmount(function(p){return p.slice(0,-1)})}
  function handleQuick(val){setAmount(function(p){var n=Number(p||"0")+val;if(n>9999999)return p;return String(n)})}

  var numVal=Number(amount||"0");
  var fmtNum=String(numVal).replace(/\B(?=(\d{3})+(?!\d))/g,",");
  var displayAmt=numVal>0?fmtNum+"원":"0원";
  var isValid=numVal>=100000;
  var keys=[1,2,3,4,5,6,7,8,9,"00",0,"back"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",
      opacity:entering?1:0,transform:entering?"translateY(0)":"translateY(16px)",
      transition:"opacity 0.5s ease, transform 0.5s ease",fontFamily:FF}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"0 "+sp.lg+"px"}}>
        {/* Title — matches Step 2 hierarchy, clears status bar */}
        <div style={{paddingTop:80}}>
          <div style={{fontSize:typo.t3.s,lineHeight:typo.t3.h+"px",fontWeight:700,color:tds.grey900,marginBottom:sp.sm}}>예산 설정</div>
          <div style={{fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",color:tds.grey500,fontWeight:400,marginBottom:sp.xl}}>매달 얼마 정도 쓰시나요?</div>
        </div>
        {/* Amount display */}
        <div style={{fontSize:28,lineHeight:"38px",fontWeight:700,color:numVal>0?tds.grey900:tds.grey300,marginBottom:sp.lg,transition:"color 0.2s ease"}}>
          {displayAmt}
          <span style={{display:"inline-block",width:2,height:28,background:tds.blue500,marginLeft:2,verticalAlign:"middle",animationName:"obBlink",animationDuration:"1s",animationIterationCount:"infinite",animationTimingFunction:"step-end"}}/>
        </div>
        <div style={{display:"flex",gap:sp.sm}}>
          {[300000,500000,1000000].map(function(v){return(
            <button key={v} onClick={function(){handleQuick(v)}} className="btn-press" style={{
              padding:"8px 14px",borderRadius:20,border:"none",background:tds.grey50,color:tds.grey700,
              fontSize:typo.t7.s,fontWeight:500,fontFamily:FF,cursor:"pointer",
            }}>{"+"+(v/10000)+"만"}</button>
          )})}
        </div>
        {numVal>0&&numVal<100000&&(
          <div style={{marginTop:sp.md,fontSize:typo.sub12.s,color:tds.red400,fontWeight:400}}>최소 10만원 이상 입력해주세요</div>
        )}
      </div>
      <div style={{flexShrink:0,paddingBottom:sp.lg}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:0,padding:"0 "+sp.md+"px"}}>
          {keys.map(function(k,i){return(
            <button key={i} onClick={function(){if(k==="back")handleBack();else handleKey(String(k))}} className="btn-press" style={{
              height:52,border:"none",background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:k==="00"?18:20,fontWeight:500,fontFamily:FF,color:k==="back"?tds.grey600:tds.grey900,cursor:"pointer",borderRadius:8,
            }}>
              {k==="back"?(<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L11 6M5 12L11 18" stroke={tds.grey600} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>):k}
            </button>
          )})}
        </div>
        <div style={{padding:"12px "+sp.lg+"px 0"}}>
          <button onClick={function(){if(isValid)onNext(numVal)}} className="btn-press" style={{
            width:"100%",padding:"16px 0",borderRadius:12,border:"none",
            background:isValid?tds.blue500:tds.grey200,color:isValid?"#fff":tds.grey400,
            fontSize:typo.t6.s,fontWeight:600,cursor:isValid?"pointer":"default",fontFamily:FF,
            transition:"background 0.2s ease, color 0.2s ease",
          }}>다음</button>
        </div>
      </div>
    </div>
  );
}

/* Step 2: Preset Selection */
function OBStepPreset(props){
  var budget=props.budget,onComplete=props.onComplete,onBack=props.onBack;
  var _sel=useState(null),selected=_sel[0],setSelected=_sel[1];
  var _enter=useState(false),entering=_enter[0],setEntering=_enter[1];
  var _ct=useState(false),customTapped=_ct[0],setCustomTapped=_ct[1];
  useEffect(function(){setTimeout(function(){setEntering(true)},80)},[]);

  var presets=[
    {id:"balanced",label:"균형형",desc:"쇼핑·여가에도 여유 있게",ratios:{"생활":0.40,"구독":0.10,"쇼핑":0.25,"엔터":0.15,"기타":0.10}},
    {id:"saving",label:"절약형",desc:"생활비 중심, 나머지는 최소로",ratios:{"생활":0.70,"구독":0.05,"쇼핑":0.10,"엔터":0.05,"기타":0.10}},
    {id:"custom",label:"직접 설정",desc:"카테고리별 예산을 직접 입력해요",ratios:null},
  ];

  function handleSelect(id){
    if(id==="custom"){setCustomTapped(true);setTimeout(function(){setCustomTapped(false)},1800);return}
    setSelected(id);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",fontFamily:FF,
      opacity:entering?1:0,transform:entering?"translateX(0)":"translateX(24px)",transition:"opacity 0.4s ease, transform 0.4s ease"}}>
      <div style={{flex:1,overflowY:"auto",padding:"0 "+sp.lg+"px"}}>
        {/* Top safe area — clear status bar (54px) */}
        <div style={{paddingTop:sp.lg}}>
          <button onClick={onBack} className="btn-press" style={{
            width:40,height:40,borderRadius:20,border:"none",background:"transparent",
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
            marginLeft:-10,
          }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke={tds.grey900} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
        </div>
        {/* Title area */}
        <div style={{paddingTop:sp.md}}>
          <div style={{fontSize:typo.t3.s,lineHeight:typo.t3.h+"px",fontWeight:700,color:tds.grey900,marginBottom:sp.sm}}>어떤 스타일로<br/>관리할까요?</div>
          <div style={{fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",color:tds.grey500,fontWeight:400,marginBottom:sp.xl}}>월 {obFmt(budget)}원 기준</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:sp.sm+sp.xs}}>
          {presets.map(function(preset,idx){
            return(
              <OBPresetCard key={preset.id} preset={preset} selected={selected===preset.id}
                budget={budget} entering={entering} idx={idx} customTapped={customTapped&&preset.id==="custom"}
                onClick={function(){handleSelect(preset.id)}}/>
            );
          })}
        </div>
        <div style={{height:100}}/>
      </div>
      <div style={{flexShrink:0,padding:"0 "+sp.lg+"px "+sp.lg+"px",background:tds.bg,position:"relative"}}>
        <div style={{position:"absolute",top:-24,left:0,right:0,height:24,background:"linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1))",pointerEvents:"none"}}/>
        <button onClick={function(){if(selected)onComplete(selected)}} className="btn-press" style={{
          width:"100%",padding:"16px 0",borderRadius:12,border:"none",
          background:selected?tds.blue500:tds.grey200,color:selected?"#fff":tds.grey400,
          fontSize:typo.t6.s,fontWeight:600,cursor:selected?"pointer":"default",fontFamily:FF,
          transition:"background 0.2s ease, color 0.2s ease",
        }}>시작하기</button>
      </div>
    </div>
  );
}

/* Step 3: Completion Transition */
function OBCompletion(props){
  var budget=props.budget,presetId=props.preset,onFinish=props.onFinish;
  var _ph=useState(0),phase=_ph[0],setPhase=_ph[1];
  var labels={balanced:"균형형",saving:"절약형"};
  useEffect(function(){
    var t1=setTimeout(function(){setPhase(1)},400);
    var t2=setTimeout(function(){setPhase(2)},1800);
    return function(){clearTimeout(t1);clearTimeout(t2)};
  },[]);

  /* Mini decorative cells */
  var deco=[
    {t:"subscription",sz:38,d:0,x:"15%",y:"22%"},{t:"subscription",sz:52,d:0.15,x:"65%",y:"16%"},
    {t:"tumor",sz:34,d:0.25,x:"75%",y:"55%"},{t:"subscription",sz:28,d:0.1,x:"20%",y:"65%"},
    {t:"dying",sz:30,d:0.35,x:"55%",y:"72%"},{t:"infected",sz:26,d:0.3,x:"35%",y:"32%"},
    {t:"subscription",sz:44,d:0.2,x:"45%",y:"50%"},
  ];
  var cellCols={subscription:[tds.blue400,tds.blue200],tumor:["#8b5cf6","#c44bd7"],dying:[tds.grey400,tds.grey300],infected:[tds.orange400,tds.orange500]};

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",fontFamily:FF}}>
      {phase>=1&&deco.map(function(d,i){
        var cc=cellCols[d.t]||cellCols.subscription;
        var gid="obmc"+i;
        return(
          <div key={i} style={{position:"absolute",left:d.x,top:d.y,width:d.sz,height:d.sz,opacity:0,
            animationName:"obCellAppear",animationDuration:"0.8s",animationDelay:d.d+"s",animationFillMode:"forwards",animationTimingFunction:"ease-out"}}>
            <svg width={d.sz} height={d.sz} viewBox="0 0 40 40">
              <defs><radialGradient id={gid}><stop offset="0%" stopColor={cc[0]} stopOpacity="0.7"/><stop offset="100%" stopColor={cc[1]} stopOpacity="0.3"/></radialGradient></defs>
              <ellipse cx="20" cy="20" rx="16" ry="14" fill={"url(#"+gid+")"}/>
              <ellipse cx="20" cy="20" rx="16" ry="14" fill="none" stroke={cc[0]} strokeWidth="0.8" strokeOpacity="0.4"/>
            </svg>
          </div>
        );
      })}
      <div style={{textAlign:"center",zIndex:2,opacity:phase>=0?1:0,transform:phase>=0?"scale(1)":"scale(0.9)",transition:"all 0.6s ease"}}>
        <div style={{width:72,height:72,borderRadius:36,background:tds.blue50,display:"flex",alignItems:"center",justifyContent:"center",
          margin:"0 auto "+sp.lg+"px",opacity:phase>=1?1:0.5,transition:"opacity 0.4s ease"}}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke={tds.blue500} strokeWidth="2"/><path d="M15.5 15.5L20 20" stroke={tds.blue500} strokeWidth="2" strokeLinecap="round"/></svg>
        </div>
        <div style={{fontSize:typo.t3.s,lineHeight:typo.t3.h+"px",fontWeight:700,color:tds.grey900,marginBottom:sp.sm}}>준비됐어요</div>
        <div style={{fontSize:typo.t6.s,lineHeight:typo.t6.h+"px",fontWeight:400,color:tds.grey500,marginBottom:sp.xs}}>월 {obFmt(budget)}원 · {labels[presetId]||presetId}</div>
        <div style={{fontSize:typo.t7.s,lineHeight:typo.t7.h+"px",fontWeight:400,color:tds.grey400}}>소비 생태계를 들여다볼게요</div>
      </div>
      <div style={{position:"absolute",bottom:sp.lg,left:sp.lg,right:sp.lg,
        opacity:phase>=2?1:0,transform:phase>=2?"translateY(0)":"translateY(20px)",transition:"all 0.5s ease"}}>
        <button onClick={onFinish} className="btn-press" style={{
          width:"100%",padding:"16px 0",borderRadius:12,border:"none",background:tds.blue500,color:"#fff",
          fontSize:typo.t6.s,fontWeight:600,cursor:"pointer",fontFamily:FF,
        }}>내 생태계 보기</button>
      </div>
    </div>
  );
}

/* Onboarding Flow Controller */
function OnboardingFlow(props){
  var onDone=props.onDone;
  var _step=useState(1),step=_step[0],setStep=_step[1];
  var _budget=useState(0),budget=_budget[0],setBudget=_budget[1];
  var _preset=useState(null),preset=_preset[0],setPreset=_preset[1];

  return(
    <div style={{height:"100%",fontFamily:FF,background:tds.bg,position:"relative",overflow:"hidden"}}>
      <style>{
        "@keyframes obBlink{0%,100%{opacity:1}50%{opacity:0}}\n"+
        "@keyframes obCardUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}\n"+
        "@keyframes obCheckPop{from{transform:scale(0)}to{transform:scale(1)}}\n"+
        "@keyframes obLabelFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}\n"+
        "@keyframes obCellAppear{0%{opacity:0;transform:scale(0.3)}60%{opacity:0.5;transform:scale(1.08)}100%{opacity:0.3;transform:scale(1)}}\n"
      }</style>
      {step===1&&<OBStepBudget onNext={function(amt){setBudget(amt);setStep(2)}}/>}
      {step===2&&<OBStepPreset budget={budget} onComplete={function(p){setPreset(p);setStep(3)}} onBack={function(){setStep(1)}}/>}
      {step===3&&<OBCompletion budget={budget} preset={preset} onFinish={function(){onDone(budget,preset)}}/>}
    </div>
  );
}

/* ═══ iPhone 14 Pro Device Frame Wrapper ═══ */
function CellfApp(){
  var _ob=useState(true),showOnboarding=_ob[0],setShowOnboarding=_ob[1];

  function handleOnboardingDone(budget,presetId){
    var presetRatios={
      balanced:{"생활":0.40,"구독":0.10,"쇼핑":0.25,"엔터":0.15,"기타":0.10},
      saving:{"생활":0.70,"구독":0.05,"쇼핑":0.10,"엔터":0.05,"기타":0.10},
    };
    BUDGETS.total=budget;
    var r=presetRatios[presetId]||presetRatios.balanced;
    var cats={};
    Object.keys(r).forEach(function(k){cats[k]=Math.round(budget*r[k])});
    BUDGETS.cats=cats;
    setShowOnboarding(false);
  }

  return(
    <div style={{
      width:"100%",maxWidth:430,margin:"0 auto",
      minHeight:"100vh",minHeight:"100dvh",
      background:tds.bg,fontFamily:FF,
      position:"relative",overflow:"hidden",
    }}>
      <style>{
        
        ""
      }</style>

      {/* 앱 컨텐츠 */}
      <div style={{
        position:"absolute",inset:0,
        overflowY:showOnboarding?"hidden":"auto",overflowX:"hidden",
        WebkitOverflowScrolling:"touch",
      }}>
        {showOnboarding
          ?<OnboardingFlow onDone={handleOnboardingDone}/>
          :<CellfAppInner/>
        }
      </div>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CellfApp));
  </script>
</body>
